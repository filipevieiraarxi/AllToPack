<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760">
  <metadata>{"box_type":"rollover_hinged_lid","length":300,"width":200,"height":120}</metadata>

  <!-- PAINEIS: cada rect e um painel identificado por id -->
  <g id="cut_lines" stroke="#ff0000" fill="rgba(245,200,66,0.15)" stroke-width="2">
    <rect id="lid_panel"   x="300" y="10"  width="300" height="120"/>
    <rect id="back_panel"  x="300" y="130" width="300" height="120"/>
    <rect id="base_panel"  x="300" y="250" width="300" height="200"/>
    <rect id="front_panel" x="300" y="450" width="300" height="120"/>
    <rect id="left_panel"  x="180" y="250" width="120" height="200"/>
    <rect id="right_panel" x="600" y="250" width="120" height="200"/>
  </g>

  <!-- DOBRAS -->
  <g id="fold_lines" stroke="#0000ff" fill="none" stroke-dasharray="6,4" stroke-width="1.5">
    <line x1="300" y1="130" x2="600" y2="130"/>  <!-- lid  <-> back  -->
    <line x1="300" y1="250" x2="600" y2="250"/>  <!-- back <-> base  -->
    <line x1="300" y1="450" x2="600" y2="450"/>  <!-- base <-> front -->
    <line x1="300" y1="250" x2="300" y2="450"/>  <!-- base <-> left  -->
    <line x1="600" y1="250" x2="600" y2="450"/>  <!-- base <-> right -->
  </g>
</svg>
